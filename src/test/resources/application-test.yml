spring:
  datasource:
    url: jdbc:h2:mem:interview-reader-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration/h2

interview-reader:
  storage-dir: ./target/test-import-sources
  import-worker:
    enabled: false
