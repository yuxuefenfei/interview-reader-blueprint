spring:
  datasource:
    url: jdbc:h2:mem:interview-reader-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration/h2

interview-reader:
  storage-dir: ./target/test-import-sources
  security:
    enabled: false
    secure-cookie: false
  import-worker:
    enabled: false
  deletion:
    worker-enabled: false
    max-concurrency: 1
    max-attempts: 3
    retry-delay: PT0.001S
    tombstone-retention: P30D
