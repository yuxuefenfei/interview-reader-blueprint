spring:
  application:
    name: interview-reader
  servlet:
    multipart:
      enabled: true
      max-file-size: ${interview-reader.upload.max-size}
      max-request-size: ${interview-reader.upload.max-size}

server:
  port: 28080

management:
  endpoints:
    web:
      exposure:
        include: health,info

interview-reader:
  upload:
    max-size: 10MB
  converter-version: json-package-0.2.0
  storage-dir: ./data/import-sources
  security:
    session-ttl: PT12H
  import-worker:
    enabled: true
    max-concurrency: 2
