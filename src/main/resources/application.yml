spring:
  application:
    name: interview-reader
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 28080

management:
  endpoints:
    web:
      exposure:
        include: health,info

interview-reader:
  converter-version: json-package-0.2.0
  storage-dir: ./data/import-sources
  security:
    enabled: true
    username: ${INTERVIEW_READER_USERNAME:admin}
    password: ${INTERVIEW_READER_PASSWORD:admin}
    session-ttl: PT12H
  import-worker:
    enabled: true
    max-concurrency: 2
