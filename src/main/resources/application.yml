spring:
  application:
    name: interview-reader
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

interview-reader:
  converter-version: json-package-0.1.0
  storage-dir: ./data/import-sources
  import-worker:
    enabled: true
    max-concurrency: 2
