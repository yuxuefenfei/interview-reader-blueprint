spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    locations: classpath:db/migration/mysql

interview-reader:
  security:
    enabled: true
    username: ${INTERVIEW_READER_USERNAME}
    password: ${INTERVIEW_READER_PASSWORD}
    secure-cookie: true
