spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/interview_reader?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC}
    username: ${DATABASE_USERNAME:interview_reader}
    password: ${DATABASE_PASSWORD:interview_reader}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    locations: classpath:db/migration/mysql

interview-reader:
  security:
    username: ${INTERVIEW_READER_USERNAME}
    password: ${INTERVIEW_READER_PASSWORD}
