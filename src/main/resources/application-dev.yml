spring:
  datasource:
    url: jdbc:h2:file:./data/interview-reader;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration/h2
  h2:
    console:
      enabled: true
      path: /h2-console

interview-reader:
  security:
    enabled: true
    username: ${INTERVIEW_READER_USERNAME:admin}
    password: ${INTERVIEW_READER_PASSWORD:admin}
    secure-cookie: false
