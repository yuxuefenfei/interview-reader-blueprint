spring:
  datasource:
    url: jdbc:h2:file:./data/interview-reader;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration/h2
  h2:
    console:
      enabled: true
      path: /h2-console
