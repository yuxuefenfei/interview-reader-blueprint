<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>原型 · 文档管理 — Interview Reader</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="admin">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark"></span> Interview Reader</div>
      <div class="nav-label">管理工作台</div>
      <nav>
        <a class="active" href="admin.html">文档管理</a>
        <a href="import.html">导入中心</a>
        <a href="editor.html">版本编辑器</a>
        <a href="reader.html">返回阅读</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <div>
          <p class="eyebrow">ADMIN</p>
          <h1>文档管理</h1>
          <p>维护已导入的面试讲义与发布状态。</p>
        </div>
        <a class="btn btn-primary" href="import.html">导入讲义</a>
      </div>
      <div class="card">
        <div class="toolbar">
          <input type="search" placeholder="搜索标题或标签…" value="" />
          <button class="btn" type="button">刷新</button>
        </div>
        <table class="data">
          <thead>
            <tr>
              <th>文档</th>
              <th>状态</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr onclick="location.href='editor.html'">
              <td>
                <div class="cell-title">
                  <strong>Java 高级开发面试题</strong>
                  <span>java · concurrency · jvm</span>
                </div>
              </td>
              <td><span class="tag">已发布</span></td>
              <td>2026-07-18</td>
              <td><button class="btn btn-sm" type="button">详情</button></td>
            </tr>
            <tr>
              <td>
                <div class="cell-title">
                  <strong>Elasticsearch 搜索引擎高级面试题</strong>
                  <span>elasticsearch · search</span>
                </div>
              </td>
              <td><span class="tag">已发布</span></td>
              <td>2026-07-16</td>
              <td><button class="btn btn-sm" type="button">详情</button></td>
            </tr>
            <tr>
              <td>
                <div class="cell-title">
                  <strong>Redis 高级面试题</strong>
                  <span>redis · cache</span>
                </div>
              </td>
              <td><span class="tag muted">草稿</span></td>
              <td>2026-07-20</td>
              <td><button class="btn btn-sm" type="button">详情</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <p class="proto-note"><a href="../index.html">← 图册</a></p>
</body>
</html>
