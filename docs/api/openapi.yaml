openapi: 3.1.0
info:
  title: Interview Reader API
  version: 0.2.0
  description: Reader study APIs and isolated desktop administration APIs.
servers:
  - url: /api
security:
  - cookieAuth: []
paths:
  /health:
    get:
      summary: Get application health
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
  /auth/login:
    post:
      summary: Create a cookie-backed session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200": { $ref: "#/components/responses/AuthSession" }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "429":
          description: Login attempt rate limit exceeded; Retry-After is returned in seconds
          headers:
            Retry-After:
              schema: { type: integer, minimum: 1 }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /auth/session:
    get:
      summary: Get the current session
      security: []
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200": { $ref: "#/components/responses/AuthSession" }
  /auth/logout:
    post:
      summary: Destroy the current session
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200": { $ref: "#/components/responses/AuthSession" }
  /reader/documents:
    get:
      summary: List published documents for reading
      parameters:
        - { name: query, in: query, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 16 } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPage" }
  /reader/document-deletions:
    get:
      summary: List recent deletion tombstones so clients can purge offline data
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Recent deletion tombstones
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeletedDocumentTombstone" }
  /reader/documents/{documentId}:
    get:
      summary: Get published document metadata
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentSummary" }
        "404": { $ref: "#/components/responses/Problem" }
  /reader/versions/{versionId}/toc:
    get:
      summary: Get the published table of contents
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TocNode" }
  /reader/versions/{versionId}/nodes/{nodeId}/content:
    get:
      summary: Get a reading node and its content blocks
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/NodeId"
        - { name: afterSeq, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NodeContent" }
  /reader/search:
    get:
      summary: Search published content
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 1 } }
        - { name: documentId, in: query, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SearchHit" }
  /reader/reading-progress/{documentId}:
    get:
      summary: Get the latest reading position
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Latest reading position
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadingProgress" }
        "204": { description: No reading position has been saved }
    put:
      summary: Save reading position
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReadingProgress" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadingProgress" }
  /reader/bookmarks:
    post:
      summary: Create or update a bookmark
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BookmarkRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "201":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Bookmark" }
  /reader/bookmarks/{bookmarkId}:
    delete:
      summary: Delete a bookmark
      parameters:
        - { name: bookmarkId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "204": { description: Deleted }
  /reader/notes:
    post:
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NoteRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "201":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
  /reader/review-states/{nodeId}:
    put:
      summary: Update review state
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReviewStateRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewState" }
  /reader/review-queue:
    get:
      summary: Get due or random review items
      parameters:
        - { name: documentId, in: query, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 50, default: 5 } }
        - { name: dueOnly, in: query, schema: { type: boolean, default: false } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReviewQueueItem" }
  /admin/documents:
    get:
      summary: List documents and draft counts for desktop management
      parameters:
        - { name: query, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminDocumentPage" }
  /admin/documents/{documentId}:
    get:
      summary: Get one document with version and draft counts
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminDocumentSummary" }
        "404": { $ref: "#/components/responses/Problem" }
  /admin/documents/{documentId}/versions:
    get:
      summary: List published, retired, and draft versions
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/VersionSummary" }
  /admin/documents/{documentId}/take-down:
    post:
      summary: Hide a published document from the reader while preserving all data
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "204": { description: Taken down }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/documents/{documentId}/restore:
    post:
      summary: Restore an offline document using its retained published version
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "204": { description: Restored }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/documents/{documentId}/deletion:
    post:
      summary: Start an irreversible permanent document deletion
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeleteDocumentRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "202":
          description: Deletion accepted or existing idempotent job returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeletionJob" }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/document-deletions/{jobId}:
    get:
      summary: Get durable permanent deletion progress
      parameters:
        - { name: jobId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Deletion progress
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeletionJob" }
  /admin/document-deletions/{jobId}/retry:
    post:
      summary: Retry a failed permanent deletion without repeating title confirmation
      parameters:
        - { name: jobId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "202":
          description: Retry accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeletionJob" }
  /admin/documents/{documentId}/versions/{sourceVersionId}/revisions:
    post:
      summary: Create an editable draft from a selected version
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - { name: sourceVersionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "201":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionSummary" }
  /admin/versions/{versionId}/editor:
    get:
      summary: Load draft metadata and the node tree without block bodies
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorSnapshot" }
    put:
      summary: Save a draft document package with draftRevision optimistic concurrency
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveDraftRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditableVersion" }
        "409": { $ref: "#/components/responses/Problem" }
    delete:
      summary: Delete an unpublished draft
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "204": { description: Deleted }
  /admin/versions/{versionId}/editor/nodes/{nodeId}/blocks:
    get:
      summary: Load one page of blocks for a draft node
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/NodeId"
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 40 } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NodeBlocksPage" }
    post:
      summary: Append a block to a draft node
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlockWriteRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "201":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorBlock" }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/versions/{versionId}/editor/nodes/{nodeId}:
    patch:
      summary: Update draft node properties
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateNodeRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorSnapshot" }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/versions/{versionId}/editor/structure:
    patch:
      summary: Replace parent and sibling order for all draft nodes
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StructureUpdateRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorSnapshot" }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/versions/{versionId}/editor/blocks/{blockId}:
    patch:
      summary: Update one draft block
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - { name: blockId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlockWriteRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorBlock" }
        "409": { $ref: "#/components/responses/Problem" }
    delete:
      summary: Delete one draft block
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - { name: blockId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: draftRevision, in: query, required: true, schema: { type: integer, minimum: 0 } }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlockMutationResult" }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/versions/{versionId}/editor/blocks/cleanup-empty:
    post:
      summary: Delete empty blocks and resequence affected nodes
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlockCleanupRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlockMutationResult" }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/documents/{documentId}/versions/{versionId}/publish:
    post:
      summary: Publish a draft and retire the previous published version
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "204": { description: Published }
        "409": { $ref: "#/components/responses/Problem" }
  /admin/import-jobs:
    post:
      summary: Create an import job for a new document or target an existing document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, XLSX, Markdown, or JSON package, up to 10 MiB; the server detects the source type.
                targetDocumentId: { type: string, format: uuid }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "202":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJob" }
  /admin/import-jobs/{jobId}:
    get:
      summary: Get import progress and terminal status
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJob" }
  /admin/import-jobs/{jobId}/issues:
    get:
      summary: List import validation issues
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ImportIssue" }
  /admin/import-jobs/{jobId}/raw-extraction:
    get:
      summary: Get converter extraction data for diagnostics
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JsonValue" }
  /admin/import-jobs/{jobId}/source-file:
    get:
      summary: Get original uploaded source file
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Original source file
          content:
            application/pdf:
              schema: { type: string, format: binary }
            application/octet-stream:
              schema: { type: string, format: binary }
  /admin/import-jobs/{jobId}/normalized-package:
    get:
      summary: Get the staged document package
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPackage" }
  /admin/import-jobs/{jobId}/normalized-package/sections/{sectionKey}:
    patch:
      summary: Revise a staged section before commit
      parameters:
        - $ref: "#/components/parameters/JobId"
        - { name: sectionKey, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPackage" }
  /admin/import-jobs/{jobId}/normalized-package/blocks/{blockKey}:
    patch:
      summary: Revise a staged content block before commit
      parameters:
        - $ref: "#/components/parameters/JobId"
        - { name: blockKey, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JsonObject" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPackage" }
  /admin/import-jobs/{jobId}/commit:
    post:
      summary: Commit a validated package as a draft version
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "201":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentVersion" }
  /admin/import-jobs/{jobId}/cancel:
    post:
      summary: Cancel an active import job
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Successful response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJob" }
  /admin/exports:
    post:
      summary: Export a selected document version
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportRequest" }
      responses:
        default: { $ref: "#/components/responses/Problem" }
        "200":
          description: Export content in the requested format
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPackage" }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
            text/markdown:
              schema: { type: string }
            text/html:
              schema: { type: string }
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: IR_SESSION
  parameters:
    DocumentId: { name: documentId, in: path, required: true, schema: { type: string, format: uuid } }
    VersionId: { name: versionId, in: path, required: true, schema: { type: string, format: uuid } }
    NodeId: { name: nodeId, in: path, required: true, schema: { type: string, format: uuid } }
    JobId: { name: jobId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    AuthSession:
      description: Authentication state
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AuthSession" }
    Problem:
      description: RFC 9457-compatible problem detail
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    JsonValue: {}
    JsonObject:
      type: object
      additionalProperties: true
    Uuid:
      type: string
      format: uuid
    NullableUuid:
      type: [string, "null"]
      format: uuid
    SourceType:
      type: string
      enum: [PDF, EXCEL, JSON_PACKAGE, MARKDOWN, MANUAL]
    NodeType:
      type: string
      enum: [PART, CHAPTER, SECTION, SUBSECTION, QUESTION, APPENDIX, OTHER]
    BlockType:
      type: string
      enum: [paragraph, heading_note, unordered_list, ordered_list, code, table, quote, callout, formula, image, divider, table_snapshot]
    SemanticRole:
      type: string
      enum: [QUESTION, ANSWER, EXPLANATION, CONCLUSION, INTRODUCTION, DIRECTORY]
    VersionStatus:
      type: string
      enum: [DRAFT, PUBLISHED, RETIRED]
    DocumentStatus:
      type: string
      enum: [DRAFT, PUBLISHED, OFFLINE, DELETING, DELETE_FAILED]
    DeletionJobStatus:
      type: string
      enum: [QUEUED, RUNNING, FAILED, COMPLETED]
    DeletionStage:
      type: string
      enum: [QUEUED, CLIENT_SYNC_MARKED, DELETING_FILES, DELETING_DATA, COMPLETED, FAILED]
    ImportStatus:
      type: string
      enum: [UPLOADED, PREFLIGHT, EXTRACTING, NORMALIZING, VALIDATING, READY, REVIEW_REQUIRED, IMPORTED, FAILED, CANCELED]
    ImportStage:
